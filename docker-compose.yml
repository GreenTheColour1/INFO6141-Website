version: '3'

services:
  blog:
    image: info6141-blog:latest
    restart: unless-stopped
    container_name: info6141-assignemnt
    ports:
      - "8043:8080"
    environment:
      ENVIRONMENT: production
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
